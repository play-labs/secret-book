name: secret_book
description: Flutter prototype for an encrypted personal document manager
publish_to: "none"
version: 0.1.3+4

environment:
  sdk: ">=3.3.0 <4.0.0"

dependencies:
  flutter:
    sdk: flutter
  cryptography_plus: ^3.0.0
  dio: ^5.9.0
  file_picker: ^11.0.2
  flutter_markdown: ^0.7.1
  flutter_oss_aliyun: ^6.4.2
  path: ^1.9.1
  path_provider: ^2.1.5
  super_clipboard: ^0.9.1

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^5.0.0

flutter:
  uses-material-design: true
